<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Iron Will - Disziplin Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #090d16;
            color: #f1f5f9;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .streak-glow {
            text-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
        }
        /* Versteckt Scrollbars für ein sauberes App-Feeling */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden justify-between select-none">

    <header class="bg-slate-950 border-b border-slate-900 p-4 flex justify-between items-center z-10">
        <div class="flex items-center space-x-2">
            <i class="fa-solid fa-shield-halved text-red-500 text-xl"></i>
            <h1 class="text-lg font-extrabold tracking-wider uppercase text-slate-100">Iron Will</h1>
        </div>
        <div class="flex items-center space-x-2 bg-slate-900 px-3 py-1.5 rounded-full border border-slate-800">
            <i class="fa-solid fa-gem text-amber-400 text-xs"></i>
            <span id="score-display" class="text-xs font-bold text-slate-200">0 Pkt</span>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 flex flex-col space-y-6">

        <div id="section-streak" class="bg-gradient-to-b from-slate-900 to-slate-950 border border-slate-900 rounded-3xl p-6 text-center shadow-xl space-y-4">
            <p class="text-xs uppercase tracking-widest text-slate-500 font-bold">Aktuelle Disziplin-Serie</p>
            
            <div class="inline-flex flex-col items-center justify-center w-40 h-40 rounded-full border-4 border-red-900/40 bg-slate-950 shadow-inner relative">
                <span id="streak-days" class="text-5xl font-black text-red-500 streak-glow">0</span>
                <span class="text-[10px] uppercase tracking-wider text-slate-400 mt-1">Tage</span>
                <span id="streak-time-sub" class="text-xs text-slate-500 font-mono mt-1">00:00:00</span>
            </div>

            <p id="quote-text" class="text-xs italic text-slate-400 max-w-xs mx-auto px-2">
                "Der stärkste Krieger ist der, der sich selbst besiegt." – Seneca
            </p>

            <div class="pt-2 flex justify-center space-x-3">
                <button onclick="openResetModal()" class="px-5 py-2.5 bg-red-950/40 hover:bg-red-900/30 border border-red-900/50 text-red-400 rounded-xl font-bold text-xs transition-all flex items-center space-x-2">
                    <i class="fa-solid fa-skull"></i>
                    <span>Rückfall eintragen</span>
                </button>
            </div>
        </div>

        <div class="space-y-3">
            <div class="flex justify-between items-center">
                <h3 class="text-xs uppercase tracking-widest text-slate-400 font-extrabold flex items-center">
                    <i class="fa-solid fa-calendar-check mr-2 text-emerald-500"></i>Tägliche Missionen
                </h3>
                <button onclick="toggleAddHabit()" class="text-xs text-indigo-400 font-bold hover:underline">
                    + Erstellen
                </button>
            </div>

            <div id="add-habit-form" class="hidden bg-slate-900/80 p-4 rounded-2xl border border-slate-800 space-y-3">
                <input type="text" id="habit-name" placeholder="z.B. 30 Min. Lesen, Kein Fastfood" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-indigo-500">
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="saveNewHabit('good')" class="bg-emerald-950/80 hover:bg-emerald-900 border border-emerald-800 text-emerald-400 text-xs font-bold py-2 rounded-xl">
                        💪 Gute Gewohnheit (+Pkt)
                    </button>
                    <button onclick="saveNewHabit('bad')" class="bg-rose-950/80 hover:bg-rose-900 border border-rose-800 text-rose-400 text-xs font-bold py-2 rounded-xl">
                        ⚠️ Limitierung (-Pkt)
                    </button>
                </div>
            </div>

            <div id="habits-list" class="space-y-2">
                </div>
        </div>

        <div class="space-y-3">
            <h3 class="text-xs uppercase tracking-widest text-slate-400 font-extrabold flex items-center">
                <i class="fa-solid fa-brain mr-2 text-amber-500"></i>Schwachstellen-Analyse
            </h3>
            <div id="logs-list" class="space-y-2">
                </div>
        </div>

    </main>

    <footer class="bg-slate-950 border-t border-slate-900 px-6 py-4 flex justify-between items-center text-xs text-slate-500">
        <span>Iron Will v2.0</span>
        <button onclick="hardResetData()" class="text-red-900 hover:text-red-700 transition-colors">
            <i class="fa-solid fa-trash-can mr-1"></i> Alles löschen
        </button>
    </footer>

    <div id="reset-modal" class="hidden fixed inset-0 bg-slate-950/90 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl w-full max-w-sm space-y-4">
            <div class="text-center">
                <i class="fa-solid fa-circle-exclamation text-red-500 text-4xl mb-2"></i>
                <h3 class="text-lg font-bold text-slate-100">Analysiere deinen Fehler</h3>
                <p class="text-xs text-slate-400 mt-1">Wer seinen Auslöser kennt, wird beim nächsten Mal stärker.</p>
            </div>

            <div class="space-y-2">
                <label class="text-xs text-slate-400 font-semibold">Warum bist du schwach geworden?</label>
                <textarea id="reset-reason" rows="3" placeholder="z.B. Ich war gestresst und müde... Auslöser war Social Media..." class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-slate-200 focus:outline-none focus:border-red-500 resize-none"></textarea>
            </div>

            <div class="flex space-x-2 pt-2">
                <button onclick="closeResetModal()" class="w-1/2 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-2.5 rounded-xl text-xs transition-colors">
                    Abbrechen
                </button>
                <button onclick="confirmResetStreak()" class="w-1/2 bg-red-600 hover:bg-red-500 text-white font-bold py-2.5 rounded-xl text-xs transition-colors">
                    Streak zurücksetzen
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- MOTIVIERENDE STOISCHE ZITATE ---
        const quotes = [
            "\"Der stärkste Krieger ist der, der sich selbst besiegt.\" – Seneca",
            "\"Du hast Macht über deinen Geist – nicht über äußere Ereignisse.\" – Marc Aurel",
            "\"Niemand ist frei, der nicht Herr über sich selbst ist.\" – Epiktet",
            "\"Disziplin ist die Brücke zwischen Zielen und Erfolg.\" – Jim Rohn",
            "\"Schmerz ist unumgänglich. Leiden ist freiwillig.\" – Buddhistische Weisheit",
            "\"Wer ein Warum zu leben hat, erträgt fast jedes Wie.\" – Friedrich Nietzsche"
        ];

        // --- DATEN-STATE (Lokal gespeichert) ---
        let state = {
            streakStart: localStorage.getItem('iw_streak_start') ? parseInt(localStorage.getItem('iw_streak_start')) : Date.now(),
            score: parseInt(localStorage.getItem('iw_score')) || 0,
            habits: JSON.parse(localStorage.getItem('iw_habits')) || [
                { id: 1, name: "30 Min. Sport gemacht", type: "good", lastCompleted: "" },
                { id: 2, name: "10 Seiten gelesen", type: "good", lastCompleted: "" },
                { id: 3, name: "Kein Junk-Food gegessen", type: "good", lastCompleted: "" }
            ],
            logs: JSON.parse(localStorage.getItem('iw_logs')) || []
        };

        // --- INITIALISIERUNG ---
        window.addEventListener('DOMContentLoaded', () => {
            if(!localStorage.getItem('iw_streak_start')) {
                localStorage.setItem('iw_streak_start', state.streakStart);
            }
            
            // Zufälliges Zitat laden
            document.getElementById('quote-text').innerText = quotes[Math.floor(Math.random() * quotes.length)];
            
            // UI Updaten
            updateUI();
            
            // Live-Ticker für die Sekunden des Streaks starten
            setInterval(updateStreakDisplay, 1000);
        });

        // --- STREAK COUNTER LOGIK ---
        function updateStreakDisplay() {
            const now = Date.now();
            const diffMs = now - state.streakStart;

            if (diffMs < 0) {
                // Falls Startdatum in der Zukunft liegt
                document.getElementById('streak-days').innerText = "0";
                document.getElementById('streak-time-sub').innerText = "00:00:00";
                return;
            }

            const diffSecs = Math.floor(diffMs / 1000);
            const days = Math.floor(diffSecs / 86400);
            const hours = Math.floor((diffSecs % 86400) / 3600);
            const minutes = Math.floor((diffSecs % 3600) / 60);
            const seconds = diffSecs % 60;

            document.getElementById('streak-days').innerText = days;
            
            // Führende Nullen formatieren
            const fH = hours.toString().padStart(2, '0');
            const fM = minutes.toString().padStart(2, '0');
            const fS = seconds.toString().padStart(2, '0');
            
            document.getElementById('streak-time-sub').innerText = `${fH}:${fM}:${fS}`;
        }

        function updateUI() {
            updateStreakDisplay();
            document.getElementById('score-display').innerText = `${state.score} Pkt`;
            renderHabits();
            renderLogs();
        }

        // --- RÜCKFALL & TAGEBUCH MODAL LOGIK ---
        function openResetModal() {
            document.getElementById('reset-reason').value = "";
            document.getElementById('reset-modal').classList.remove('hidden');
        }

        function closeResetModal() {
            document.getElementById('reset-modal').classList.add('hidden');
        }

        function confirmResetStreak() {
            const reason = document.getElementById('reset-reason').value.trim() || "Keine Gründe eingetragen.";
            const now = Date.now();
            
            // Berechne wie lange der vorherige Streak war
            const diffMs = now - state.streakStart;
            const days = Math.floor(diffMs / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diffMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

            // Logeintrag speichern
            const newLog = {
                date: new Date().toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }),
                duration: `${days}T ${hours}St`,
                reason: reason
            };

            state.logs.unshift(newLog); // Neuestes oben
            localStorage.setItem('iw_logs', JSON.stringify(state.logs));

            // Streak zurücksetzen & Punkte abziehen (Bestrafung im "Pit")
            state.streakStart = now;
            localStorage.setItem('iw_streak_start', state.streakStart);

            state.score = Math.max(0, state.score - 50); // Zieht 50 Punkte ab
            localStorage.setItem('iw_score', state.score);

            closeResetModal();
            updateUI();
            
            alert("Streak wurde auf 0 zurückgesetzt. Lerne aus deinen Fehlern und steh wieder auf!");
        }

        // --- GEWOHNHEITEN LOGIK ---
        function toggleAddHabit() {
            const form = document.getElementById('add-habit-form');
            form.classList.toggle('hidden');
        }

        function saveNewHabit(type) {
            const nameInput = document.getElementById('habit-name');
            const name = nameInput.value.trim();
            if(!name) return alert("Bitte trag einen Namen für die Mission ein!");

            const newHabit = {
                id: Date.now(),
                name: name,
                type: type,
                lastCompleted: ""
            };

            state.habits.push(newHabit);
            localStorage.setItem('iw_habits', JSON.stringify(state.habits));
            
            nameInput.value = "";
            toggleAddHabit();
            updateUI();
        }

        function completeHabit(id) {
            const todayStr = new Date().toDateString();
            const habitIndex = state.habits.findIndex(h => h.id === id);
            
            if (habitIndex !== -1) {
                const habit = state.habits[habitIndex];
                
                if (habit.lastCompleted === todayStr) {
                    alert("Diese Mission hast du heute schon erfüllt!");
                    return;
                }

                habit.lastCompleted = todayStr;
                
                // Punktevergabe (The Vault)
                if (habit.type === 'good') {
                    state.score += 10;
                } else {
                    state.score += 15; // Belohnung fürs erfolgreiche Einhalten eines Limits
                }

                localStorage.setItem('iw_habits', JSON.stringify(state.habits));
                localStorage.setItem('iw_score', state.score);
                updateUI();
            }
        }

        function deleteHabit(id, event) {
            event.stopPropagation(); // Verhindert, dass das Anklicken der Mülltonne die Gewohnheit abschließt
            state.habits = state.habits.filter(h => h.id !== id);
            localStorage.setItem('iw_habits', JSON.stringify(state.habits));
            updateUI();
        }

        function renderHabits() {
            const list = document.getElementById('habits-list');
            list.innerHTML = "";
            const todayStr = new Date().toDateString();

            state.habits.forEach(habit => {
                const isDone = habit.lastCompleted === todayStr;
                const card = document.createElement('div');
                
                card.className = `flex justify-between items-center p-4 rounded-2xl border transition-all ${
                    isDone 
                    ? 'bg-emerald-950/20 border-emerald-900/60 opacity-60' 
                    : 'bg-slate-900 border-slate-800/80 active:bg-slate-800'
                }`;

                card.onclick = () => { if(!isDone) completeHabit(habit.id); };

                card.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <div class="w-7 h-7 rounded-full flex items-center justify-center ${
                            isDone 
                            ? 'bg-emerald-600 text-white' 
                            : habit.type === 'good' ? 'bg-slate-950 text-emerald-500 border border-slate-800' : 'bg-slate-950 text-rose-500 border border-slate-800'
                        }">
                            <i class="fa-solid ${isDone ? 'fa-check text-xs' : habit.type === 'good' ? 'fa-plus text-xs' : 'fa-ban text-xs'}"></i>
                        </div>
                        <div>
                            <p class="text-sm font-semibold text-slate-200">${habit.name}</p>
                            <p class="text-[10px] text-slate-500 font-bold uppercase">${habit.type === 'good' ? '+10 Pkt (Erfolg)' : '+15 Pkt (Limit eingehalten)'}</p>
                        </div>
                    </div>
                    <button onclick="deleteHabit(${habit.id}, event)" class="text-slate-600 hover:text-red-500 p-2 transition-colors">
                        <i class="fa-solid fa-trash-can text-sm"></i>
                    </button>
                `;
                list.appendChild(card);
            });
        }

        // --- ANALYSE / DIARY LOGS RENDERN ---
        function renderLogs() {
            const container = document.getElementById('logs-list');
            container.innerHTML = "";

            if(state.logs.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-6 bg-slate-900/30 border border-slate-900/50 rounded-2xl">
                        <p class="text-xs text-slate-600">Noch keine Rückfälle erlitten. Bleib stark!</p>
                    </div>
                `;
                return;
            }

            state.logs.forEach(log => {
                const item = document.createElement('div');
                item.className = "bg-slate-950 border border-slate-900 p-4 rounded-2xl space-y-2";
                item.innerHTML = `
                    <div class="flex justify-between items-center text-[10px] font-bold">
                        <span class="text-slate-500">${log.date}</span>
                        <span class="bg-red-950 text-red-400 px-2.5 py-0.5 rounded-full border border-red-900/40">Zusammenbruch nach ${log.duration}</span>
                    </div>
                    <p class="text-xs text-slate-400 leading-relaxed italic">"${log.reason}"</p>
                `;
                container.appendChild(item);
            });
        }

        // --- HARD RESET ---
        function hardResetData() {
            if(confirm("Bist du sicher? Alle deine Streaks, gesammelten Punkte und das Tagebuch werden unwiderruflich gelöscht!")) {
                localStorage.clear();
                state.streakStart = Date.now();
                state.score = 0;
                state.habits = [
                    { id: 1, name: "30 Min. Sport gemacht", type: "good", lastCompleted: "" },
                    { id: 2, name: "10 Seiten gelesen", type: "good", lastCompleted: "" },
                    { id: 3, name: "Kein Junk-Food gegessen", type: "good", lastCompleted: "" }
                ];
                state.logs = [];
                
                localStorage.setItem('iw_streak_start', state.streakStart);
                localStorage.setItem('iw_score', state.score);
                localStorage.setItem('iw_habits', JSON.stringify(state.habits));
                localStorage.setItem('iw_logs', JSON.stringify(state.logs));
                
                updateUI();
                alert("Erfolgreich zurückgesetzt! Ein neuer, sauberer Start beginnt jetzt.");
            }
        }
    </script>
</body>
</html>
