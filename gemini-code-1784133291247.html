<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hablamos - KI Spanisch-Coach</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }
        .mic-active {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden justify-between">

    <header class="bg-slate-900 border-b border-slate-800 p-4 flex justify-between items-center z-10">
        <div class="flex items-center space-x-2">
            <span class="text-2xl">🇪🇸</span>
            <h1 class="text-xl font-bold tracking-tight bg-gradient-to-r from-yellow-400 to-red-500 bg-clip-text text-transparent">Hablamos</h1>
        </div>
        <div class="flex space-x-3">
            <button onclick="toggleView('words')" class="text-slate-400 hover:text-white p-2" title="Wortschatz">
                <i class="fa-solid fa-book text-xl"></i>
            </button>
            <button onclick="toggleView('settings')" class="text-slate-400 hover:text-white p-2" title="Einstellungen">
                <i class="fa-solid fa-gear text-xl"></i>
            </button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 flex flex-col justify-between">

        <div id="view-chat" class="flex flex-col h-full justify-between space-y-4">
            <div class="flex flex-col items-center justify-center flex-1 space-y-4 my-auto">
                <div id="ai-avatar" class="w-32 h-32 rounded-full bg-gradient-to-tr from-yellow-500 via-red-500 to-purple-600 flex items-center justify-center shadow-2xl relative transition-all duration-300">
                    <i class="fa-solid fa-user-astronaut text-5xl text-white"></i>
                    <div id="ai-speaking-indicator" class="absolute -inset-2 rounded-full border-4 border-yellow-400 opacity-0 transition-opacity duration-300"></div>
                </div>
                <div class="text-center">
                    <h2 class="text-lg font-semibold" id="chat-status">Bereit zum Telefonieren</h2>
                    <p class="text-xs text-slate-400" id="word-count-info">0 Wörter im Speicher</p>
                </div>
            </div>

            <div class="bg-slate-900/60 border border-slate-800/80 rounded-2xl p-4 h-44 overflow-y-auto space-y-3" id="transcript-container">
                <div class="text-center text-xs text-slate-500 py-4">Dein Gespräch wird hier in Echtzeit angezeigt...</div>
            </div>

            <div class="flex flex-col items-center space-y-4 pb-6">
                <button id="btn-mic" onclick="toggleSpeech()" class="w-20 h-20 rounded-full bg-red-600 hover:bg-red-500 flex items-center justify-center shadow-lg transition-all disabled:bg-slate-700 disabled:opacity-50" disabled>
                    <i id="mic-icon" class="fa-solid fa-microphone text-3xl text-white"></i>
                </button>
                <button id="btn-start-call" onclick="startCall()" class="px-6 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-full font-semibold text-sm transition-all shadow-md">
                    Gespräch starten
                </button>
            </div>
        </div>

        <div id="view-words" class="hidden flex flex-col h-full space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-lg font-bold"><i class="fa-solid fa-book mr-2 text-yellow-400"></i>Dein Wortschatz</h2>
                <button onclick="toggleView('chat')" class="text-sm bg-slate-800 px-3 py-1 rounded-full text-slate-300">Zurück zum Chat</button>
            </div>

            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="input-es" placeholder="Spanisch (z.B. tienda)" class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-yellow-400">
                    <input type="text" id="input-de" placeholder="Deutsch (z.B. Laden)" class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-yellow-400">
                </div>
                <button onclick="addWord()" class="w-full bg-yellow-500 hover:bg-yellow-400 text-slate-950 font-bold py-2 rounded-lg text-sm transition-colors">
                    Wort hinzufügen
                </button>
            </div>

            <div class="flex-1 overflow-y-auto bg-slate-900/40 border border-slate-800 rounded-xl p-2 space-y-1" id="word-list">
                </div>
        </div>

        <div id="view-settings" class="hidden flex flex-col h-full space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-lg font-bold"><i class="fa-solid fa-gear mr-2 text-blue-400"></i>Einstellungen</h2>
                <button onclick="toggleView('chat')" class="text-sm bg-slate-800 px-3 py-1 rounded-full text-slate-300">Zurück zum Chat</button>
            </div>

            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 space-y-4">
                <div class="space-y-1">
                    <label class="text-xs text-slate-400 font-semibold block">GROQ API KEY</label>
                    <input type="password" id="input-api-key" placeholder="gsk_..." class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-400">
                    <p class="text-[10px] text-slate-500">Dein Key wird sicher lokal in deinem Browser-Speicher gesichert und niemals übertragen.</p>
                </div>

                <div class="space-y-1">
                    <label class="text-xs text-slate-400 font-semibold block">KI MODELL</label>
                    <select id="select-model" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none">
                        <option value="llama-3.1-8b-instant">Llama 3.1 8B (Super schnell, empfohlen)</option>
                        <option value="llama-3.3-70b-versatile">Llama 3.3 70B (Extrem schlau)</option>
                    </select>
                </div>

                <button onclick="saveSettings()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 rounded-lg text-sm transition-colors">
                    Einstellungen speichern
                </button>
            </div>
        </div>

    </main>

    <footer class="bg-slate-900 border-t border-slate-800 py-3 text-center text-[10px] text-slate-500">
        Hablamos App v2.0 • 100% Serverless & Privat
    </footer>

    <script>
        // --- DATA STATE (Lokal im Browser gespeichert) ---
        let state = {
            words: JSON.parse(localStorage.getItem('hablamos_words')) || [],
            apiKey: localStorage.getItem('hablamos_api_key') || '',
            model: localStorage.getItem('hablamos_model') || 'llama-3.1-8b-instant',
            chatHistory: []
        };

        // --- SPEECH RECOGNITION & SYNTHESIS SETUP ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isRecording = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'es-ES'; // Wir sprechen Spanisch ein
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                isRecording = true;
                document.getElementById('btn-mic').classList.add('mic-active');
                document.getElementById('chat-status').innerText = "Höre zu...";
            };

            recognition.onend = () => {
                isRecording = false;
                document.getElementById('btn-mic').classList.remove('mic-active');
                document.getElementById('chat-status').innerText = "Verarbeite...";
            };

            recognition.onresult = (event) => {
                const speechToText = event.results[0][0].transcript;
                appendTranscript('User', speechToText);
                sendToAI(speechToText);
            };

            recognition.onerror = (event) => {
                console.error("Speech Error:", event.error);
                document.getElementById('chat-status').innerText = "Fehler bei Aufnahme!";
                document.getElementById('btn-mic').classList.remove('mic-active');
                isRecording = false;
            };
        }

        // --- APPLIKATIONS-INITIALISIERUNG ---
        window.addEventListener('DOMContentLoaded', () => {
            // UI mit geladenen Werten füllen
            document.getElementById('input-api-key').value = state.apiKey;
            document.getElementById('select-model').value = state.model;
            updateWordList();
            checkApiConfiguration();
            
            // Stimmen im Hintergrund laden für iOS/Chrome Kompatibilität
            window.speechSynthesis.getVoices();
        });

        function checkApiConfiguration() {
            const btnMic = document.getElementById('btn-mic');
            const statusText = document.getElementById('chat-status');
            
            if (!state.apiKey) {
                statusText.innerHTML = "⚠️ <span class='text-red-400'>Bitte trage deinen Groq API Key in den Einstellungen ein!</span>";
                btnMic.disabled = true;
            } else if (state.words.length === 0) {
                statusText.innerHTML = "ℹ️ <span class='text-yellow-400'>Füge im 'Wortschatz' Wörter hinzu, um zu starten!</span>";
                btnMic.disabled = true;
            } else if (!SpeechRecognition) {
                statusText.innerHTML = "❌ Browser unterstützt keine Spracheingabe!";
                btnMic.disabled = true;
            } else {
                statusText.innerText = "Bereit zum Telefonieren";
                btnMic.disabled = false;
            }
        }

        // --- NAVIGATION ---
        function toggleView(view) {
            document.getElementById('view-chat').classList.add('hidden');
            document.getElementById('view-words').classList.add('hidden');
            document.getElementById('view-settings').classList.add('hidden');

            if (view === 'chat') {
                document.getElementById('view-chat').classList.remove('hidden');
                checkApiConfiguration();
            } else if (view === 'words') {
                document.getElementById('view-words').classList.remove('hidden');
            } else if (view === 'settings') {
                document.getElementById('view-settings').classList.remove('hidden');
            }
        }

        // --- EINSTELLUNGEN LOGIK ---
        function saveSettings() {
            const key = document.getElementById('input-api-key').value.trim();
            const model = document.getElementById('select-model').value;
            
            state.apiKey = key;
            state.model = model;
            
            localStorage.setItem('hablamos_api_key', key);
            localStorage.setItem('hablamos_model', model);
            
            alert('Einstellungen erfolgreich auf deinem Handy gesichert!');
            toggleView('chat');
        }

        // --- WORTSCHATZ LOGIK ---
        function addWord() {
            const es = document.getElementById('input-es').value.trim();
            const de = document.getElementById('input-de').value.trim();
            
            if(!es || !de) return alert("Bitte beide Felder ausfüllen!");

            // Dubletten-Check
            if(state.words.some(w => w.es.toLowerCase() === es.toLowerCase())) {
                return alert("Dieses Wort hast du bereits gelernt!");
            }

            state.words.push({ es, de, count: 0 });
            localStorage.setItem('hablamos_words', JSON.stringify(state.words));
            
            document.getElementById('input-es').value = '';
            document.getElementById('input-de').value = '';
            
            updateWordList();
        }

        function deleteWord(index) {
            state.words.splice(index, 1);
            localStorage.setItem('hablamos_words', JSON.stringify(state.words));
            updateWordList();
        }

        function updateWordList() {
            const container = document.getElementById('word-list');
            const countInfo = document.getElementById('word-count-info');
            
            countInfo.innerText = `${state.words.length} Wörter gelernt`;
            container.innerHTML = '';

            if(state.words.length === 0) {
                container.innerHTML = '<div class="text-center text-slate-500 text-xs py-8">Noch keine Wörter eingetragen.</div>';
                return;
            }

            state.words.forEach((word, index) => {
                const card = document.createElement('div');
                card.className = "flex justify-between items-center bg-slate-900 border border-slate-800/80 p-3 rounded-lg mb-1";
                card.innerHTML = `
                    <div>
                        <span class="font-bold text-yellow-400">${word.es}</span> 
                        <span class="text-xs text-slate-400">(${word.de})</span>
                    </div>
                    <div class="flex items-center space-x-3">
                        <span class="text-[10px] bg-slate-800 text-slate-400 px-2 py-1 rounded-full">${word.count || 0}x</span>
                        <button onclick="deleteWord(${index})" class="text-red-500 hover:text-red-400 p-1">
                            <i class="fa-solid fa-trash text-xs"></i>
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // --- AUDIOPRODUKTION (TEXT-TO-SPEECH) ---
        function speakSpanish(text) {
            return new Promise((resolve) => {
                window.speechSynthesis.cancel(); // Vorherige Audio stoppen
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'es-ES';
                
                // Avatar pulsieren lassen während gesprochen wird
                const speakingIndicator = document.getElementById('ai-speaking-indicator');
                speakingIndicator.classList.remove('opacity-0');
                speakingIndicator.classList.add('opacity-100');

                // Passende Stimme finden
                const voices = window.speechSynthesis.getVoices();
                const esVoice = voices.find(v => v.lang.startsWith('es') || v.lang.startsWith('es-ES'));
                if (esVoice) utterance.voice = esVoice;

                utterance.onend = () => {
                    speakingIndicator.classList.remove('opacity-100');
                    speakingIndicator.classList.add('opacity-0');
                    resolve();
                };

                utterance.onerror = () => {
                    speakingIndicator.classList.remove('opacity-100');
                    speakingIndicator.classList.add('opacity-0');
                    resolve();
                };

                window.speechSynthesis.speak(utterance);
            });
        }

        // --- CHAT LOGIK & TRANSMITTAL ---
        function toggleSpeech() {
            if (!recognition) return;
            if (isRecording) {
                recognition.stop();
            } else {
                recognition.start();
            }
        }

        function appendTranscript(role, text) {
            const container = document.getElementById('transcript-container');
            
            // Erstes Dummy-Text entfernen falls vorhanden
            if (container.innerText.includes("Dein Gespräch wird hier in Echtzeit angezeigt")) {
                container.innerHTML = '';
            }

            const msg = document.createElement('div');
            msg.className = "text-sm";
            if (role === 'User') {
                msg.innerHTML = `<span class="text-sky-400 font-bold">Du:</span> <span class="text-slate-200">${text}</span>`;
            } else if (role === 'System-Lehrer') {
                msg.innerHTML = `<div class="bg-amber-500/10 border border-amber-500/20 text-amber-300 text-xs p-2 rounded-lg mt-1 mb-2">💡 <strong>Coach:</strong> ${text}</div>`;
            } else {
                msg.innerHTML = `<span class="text-yellow-400 font-bold">KI:</span> <span class="text-slate-200">${text}</span>`;
            }
            
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
        }

        // START-CALL AUSLÖSEN
        function startCall() {
            if (state.words.length === 0) return alert("Füge zuerst ein paar Wörter im Wortschatz hinzu!");
            if (!state.apiKey) return alert("Bitte hinterlege zuerst deinen API-Key!");

            state.chatHistory = [];
            document.getElementById('transcript-container').innerHTML = '';
            document.getElementById('chat-status').innerText = "Wähle Verbindung...";
            
            // Dummy-Input, um das Gespräch zu starten
            sendToAI("[START_CONVERSATION]");
            document.getElementById('btn-start-call').innerText = "Anruf neustarten";
        }

        // GROQ API CALL
        async function sendToAI(userText) {
            if (!state.apiKey) return;

            // Vokabeldaten für System Prompt aufbereiten
            const wordsListString = state.words.map(w => `"${w.es}" (bedeutet: ${w.de})`).join(', ');

            // Der geniale System-Prompt, der die KI zwingt, nur deine Wörter zu nutzen
            const systemPrompt = `Du bist ein freundlicher spanischer Telefonpartner.
Der Benutzer lernt Spanisch. Er kennt AUSSCHLIESSLICH folgende Wörter: [ ${wordsListString} ].

STRENGE REGELN FÜR DICH:
1. Benutze für deine spanische Antwort NUR Wörter aus der obigen Liste des Benutzers. Ausnahme: Unbedingt notwendige funktionale Füllwörter wie "el, la, un, una, y, en, que, de, no, sí". Wenn die Liste sehr klein ist, baue extrem kurze, simple Sätze.
2. Wiederhole NIEMALS die Eingabe des Benutzers. Stell eine neue Frage!
3. Deine Antwort muss EXTREM kurz sein (maximal 1 bis 2 Sätze), da dies ein flüssiges Telefonat ist.
4. Korrektur-Modus: Falls der Benutzer im vorherigen Satz Grammatik- oder Vokabelfehler gemacht hat, beginne deine Antwort mit einer ganz kurzen, freundlichen deutschen Erklärung in geschweiften Klammern, z.B. "{Grammatik-Tipp: Man sagt 'soy de' statt 'soy en'}". Wenn alles fehlerfrei war, lass die Klammern einfach komplett weg.`;

            // Aufbau der Chat-Historie
            if (state.chatHistory.length === 0) {
                state.chatHistory.push({ role: "system", content: systemPrompt });
            }

            if (userText !== "[START_CONVERSATION]") {
                state.chatHistory.push({ role: "user", content: userText });
            } else {
                state.chatHistory.push({ role: "user", content: "Hola! Lass uns ein Gespräch beginnen und stell mir eine Frage, die nur meine Vokabeln nutzt!" });
            }

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${state.apiKey}`
                    },
                    body: JSON.stringify({
                        model: state.model,
                        messages: state.chatHistory,
                        temperature: 0.3
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const aiRawResponse = data.choices[0].message.content;
                state.chatHistory.push({ role: "assistant", content: aiRawResponse });

                // Verarbeitung von Korrekturen in geschweiften Klammern {}
                let aiResponseClean = aiRawResponse;
                let correctionText = "";
                
                const bracketMatch = aiRawResponse.match(/\{(.*?)\}/);
                if (bracketMatch) {
                    correctionText = bracketMatch[1];
                    aiResponseClean = aiRawResponse.replace(/\{.*?\}/, '').trim();
                }

                // UI Updates
                document.getElementById('chat-status').innerText = "Spricht...";
                
                if (correctionText) {
                    appendTranscript('System-Lehrer', correctionText);
                }

                appendTranscript('AI', aiResponseClean);

                // Wortzähler für Statistik hochsetzen (wenn der User Wörter erfolgreich benutzt hat)
                if (userText !== "[START_CONVERSATION]") {
                    state.words.forEach(w => {
                        if (userText.toLowerCase().includes(w.es.toLowerCase())) {
                            w.count = (w.count || 0) + 1;
                        }
                    });
                    localStorage.setItem('hablamos_words', JSON.stringify(state.words));
                    updateWordList();
                }

                // Audio abspielen
                await speakSpanish(aiResponseClean);
                
                document.getElementById('chat-status').innerText = "Du bist dran (Tippe auf das Mikrofon)";

            } catch (err) {
                console.error(err);
                alert("API-Fehler: " + err.message);
                document.getElementById('chat-status').innerText = "Fehler!";
            }
        }
    </script>
</body>
</html>
